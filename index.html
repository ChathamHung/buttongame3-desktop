<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download desktop app</title>
  <style>
    * {
      font-family: Arial, Helvetica, sans-serif;
    }

    .hide {
      display: none !important;
    }

    body {
      padding: 0;
    }

    h2 {
      margin-top: 0;
    }

    p {
      margin-top: 0;
    }

    .os-select {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }

    .os-select > button {
      background-color: transparent;
      border: none;
      outline: none;
      color: white;
      cursor: pointer;
      font-size: 16px;
      padding: 20px;
      height: 120px;
      min-height: 120px;
      width: calc(100% / 3 - 20px);
      min-width: 120px;
      text-align: left;
      flex-wrap: nowrap;
      border-radius: 20px;
      transition: background-color 0.1s ease, transform 0.1s ease;
      -webkit-user-select: none !important;
      user-select: none !important;
      outline: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      transform: scale(1);
    }

    .os-select > button[data-title]::after {
      position: absolute;
      content: attr(data-title);
      text-align: center;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      opacity: 0;
      transition: opacity 0.1s ease, transform 0.1s ease;
      pointer-events: none;
    }
    
    .os-select > button[disabled]::before {
      position: absolute;
      content: "Coming Soon";
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      background-color: rgba(196, 160, 0, 0.1);
      text-align: center;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100%);
      height: 25px;
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }

    .os-select > button:hover, .os-select > button:focus {
      background-color: rgba(190, 190, 190, 0.3);
      box-shadow: 0 2px 3px rgba(0, 0, 0, 0.1);
      transform: scale(1.03);
    }
    
    .os-select > button:hover[data-title]::after, button:focus[data-title]::after {
      opacity: 1;
    }

    .os-select > button:active {
      background-color: rgba(190, 190, 190, 0.4);
      transform: scale(0.98);
    }

    .os-select > button[disabled] {
      background-color: rgba(190, 190, 190, 0.1) !important;
      color: rgb(189, 189, 189) !important;
      transform: scale(1) !important;
      box-shadow: none !important;
      cursor: not-allowed;
    }

    .os-select > button[disabled][data-title]::after {
      opacity: 1;
    }

    .os-select > button.selected {
      font-weight: bold;
      background-color: rgba(190, 190, 190, 0.2);
    }

    .os-select > button.selected::after {
      opacity: 1;
    }

    button img {
      margin-bottom: 10px;
      width: 48px;
      height: 48px;
    }

    .version-select {
      display: flex;
      flex-direction: row;
      justify-content: space-evenly;
      align-items: center;
      gap: 20px;
      margin-top: 10px;
    }

    .version-select > button {
      background-color: transparent;
      border: none;
      outline: none;
      color: var(--text-colour);
      cursor: pointer;
      font-size: 16px;
      padding: 5px 15px;
      height: 40px;
      flex: 1;
      min-height: 40px;
      text-align: center;
      flex-wrap: nowrap;
      border-radius: 20px;
      transition: background-color 0.1s ease, transform 0.1s ease;
      -webkit-user-select: none !important;
      user-select: none !important;
      outline: none;
      transform: scale(1);
    }

    .version-select > button:hover, .version-select > button:focus {
      background-color: rgba(190, 190, 190, 0.3);
      box-shadow: 0 2px 3px rgba(0, 0, 0, 0.1);
      transform: scale(1.03);
    }

    .version-select > button:active {
      background-color: rgba(190, 190, 190, 0.4);
      transform: scale(0.98);
    }

    .version-select > button[disabled] {
      background-color: rgba(190, 190, 190, 0.1) !important;
      color: rgb(189, 189, 189) !important;
      transform: scale(1) !important;
      box-shadow: none !important;
      cursor: not-allowed;
    }
  </style>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const inGame = urlParams.get("inGame");
    if (inGame) {
      const style = document.createElement('style');
      style.innerHTML = `* {
          color: white !important;
          -webkit-user-select: none;
          user-select: none;
          scrollbar-width: thin;
          scrollbar-color: rgba(190, 190, 190, 0.3) transparent;
        }`;
      document.head.appendChild(style);

      document.addEventListener("contextmenu", (e) => {
        e.preventDefault();
      });
    } else {
      window.location.href = "https://chathamhung.github.io/buttongame3?download=true";
    }

    let latestReleases = {};

    function getLatestReleases() {
      return fetch("./lastest.json")
        .then(response => response.json())
        .catch(() => ({}));
    }

    function buttonClicked(button, os) {
      button.classList.add("selected");
      document.querySelector(".version-select").classList.remove("hide");
      const osButtons = document.querySelectorAll(".os-select button");
      osButtons.forEach(otherButton => {
        if (otherButton !== button) {
          otherButton.classList.remove("selected");
        }
      });
      // Update version buttons
      const versionButtons = document.querySelectorAll(".version-select button");
      versionButtons.forEach(vButton => {
        const version = vButton.className;
        let text = version.charAt(0).toUpperCase() + version.slice(1); // Offline or Online
        if (latestReleases[os] && latestReleases[os].size && latestReleases[os].size[version]) {
          text += ` (${latestReleases[os].size[version]})`;
        }
        vButton.textContent = text;
        if (latestReleases[os] && latestReleases[os][version]) {
          vButton.disabled = false;
          vButton.addEventListener("click", () => {
            window.open(latestReleases[os][version], "_blank");
          });
        } else {
          vButton.disabled = true;
        }
      });
    }

    function setup() {
      getLatestReleases().then(data => {
        latestReleases = data;
        const buttons = document.querySelectorAll(".os-select button");
        buttons.forEach(button => {
          const os = button.className;
          if (latestReleases[os] && (latestReleases[os]["offline"] || latestReleases[os]["online"])) {
            button.disabled = false;
            button.addEventListener("click", () => {
              buttonClicked(button, os);
            });
          } else {
            button.disabled = true;
          }
        });
      });
    }

    document.addEventListener("DOMContentLoaded", setup);
  </script>
</head>

<body>
  <p>Select your system:</p>
  <div class="os-select">
    <button class="windows" data-title="Windows">
      <img src="https://chathamhung.github.io/buttongame3/res/images/os/windows.png" alt="Windows logo" draggable="false"/>
    </button>
    <button class="macos" data-title="macOS">
      <img src="https://chathamhung.github.io/buttongame3/res/images/os/macos.png" alt="macOS logo" draggable="false"/>
    </button>
    <button class="linux" data-title="Linux">
      <img src="https://chathamhung.github.io/buttongame3/res/images/os/linux.png" alt="Linux logo" draggable="false"/>
    </button>
  </div>
  <div class="version-select hide">
    <button class="offline">Offline</button>
    <button class="online">Online</button>
  </div>
  <!-- <p>Coming soon on mobile!</p> -->
</body>

</html>
