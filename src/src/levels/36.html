<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        -webkit-user-select: none; /* Safari */
        user-select: none;
      }

      body {
        margin-top: 60px; /* Topbar area */

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 100px);
      }

      button {
        /* Example button (can be change) */
        padding: 10px 20px;
        border-radius: 10px;
        background-color: #75c64f;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.1s ease;
      }

      button:hover {
        background-color: #60a83e;
      }

      button:disabled {
        background-color: #7c7c7c;
        cursor: not-allowed;
      }

      .slider {
        width: 300px;
      }

      .slider-container {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .arrow-button {
        padding: 8px 12px;
        border-radius: 5px;
        background-color: #4a90e2;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background-color 0.1s ease;
        min-width: 40px;
      }

      .arrow-button:hover {
        background-color: #357abd;
      }

      .arrow-button:active {
        background-color: #2d6ba3;
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <h1 id="title">Slide to 0</h1>

    <div class="slider-container">
      <button id="leftArrow" class="arrow-button">◀</button>
      <input
        type="range"
        id="slider"
        class="slider"
        min="0.0"
        max="100.0"
        value="50.0"
        step="0.1"
      />
      <button id="rightArrow" class="arrow-button">▶</button>
    </div>

    <p id="sliderValue">Drag the slider to start!</p>

    <button id="nextLevel" disabled>OK</button>

    <script src="../js/levelsManager.js"></script>
    <!-- Do not delete -->
    <script>
      const levelManager = new level();
      const levelNumber = 36;

      init(levelNumber); // Initialize the level

      const nextButton = document.querySelector("#nextLevel");
      const slider = document.querySelector("#slider");
      const sliderValue = document.querySelector("#sliderValue");
      const title = document.querySelector("#title");
      const leftArrow = document.querySelector("#leftArrow");
      const rightArrow = document.querySelector("#rightArrow");

      let clickedArrow = false;

      const randomValue = Number((Math.random() * 100).toFixed(1));
      const randomValue2 = Number((Math.random() * 100).toFixed(1));

      slider.value = randomValue2;

      function updateSliderValue(value) {
        sliderValue.textContent = value;
        if (parseFloat(value) === randomValue) {
          nextButton.disabled = false;
        } else {
          nextButton.disabled = true;
        }
      }

      slider.addEventListener("input", (e) => {
        updateSliderValue(e.target.value);
      });

      leftArrow.addEventListener("click", () => {
        clickedArrow = true;
        const currentValue = parseFloat(slider.value);
        const newValue = Math.max(0, currentValue - 0.1);
        slider.value = newValue.toFixed(1);
        updateSliderValue(slider.value);
      });

      rightArrow.addEventListener("click", () => {
        clickedArrow = true;
        const currentValue = parseFloat(slider.value);
        const newValue = Math.min(100, currentValue + 0.1);
        slider.value = newValue.toFixed(1);
        updateSliderValue(slider.value);
      });

      levelManager.updateTip("");
      levelManager.updateCompleteMessage("Wow! You did it! 🎉");
      levelManager.setSkipEnable(true);

      title.textContent = `Slide to ${randomValue}`;

      nextButton.addEventListener("click", () => {
        // When clicked button, then go to the next level
        if (!clickedArrow) {
          levelManager.completeAchievement(17);
        } else {
          levelManager.updateCompleteMessage("Next time try without using the arrow keys.");
        }
        levelManager.completeLevel();
      });

      document.addEventListener("contextmenu", (e) => {
        // Disable right-click menu
        e.preventDefault();
      });
    </script>
  </body>
</html>
