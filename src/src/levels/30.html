<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      font-family: Arial, Helvetica, sans-serif;
      -webkit-user-select: none; /* Safari */
      user-select: none;
    }

    body {
      margin-top: 60px; /* Topbar area */

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 100px);
    }

    button { /* Example button (can be change) */
      padding: 10px 20px;
      border-radius: 10px;
      background-color: #75c64f;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.1s ease;
    }

    button:hover {
      background-color: #60a83e;
    }

    button:disabled {
      background-color: #7c7c7c;
      cursor: not-allowed;
    }

    /* CSS here */
  </style>
</head>
<body>
  <h1>Roll the Designated Number!</h1>
  <div id="designatedNumber" style="font-size: 24px; margin-bottom: 10px;"></div>
  <div id="rolledNumber" style="font-size: 32px; margin-bottom: 20px;">-</div>
  <button id="rollButton">Roll</button>
  <script src="../js/levelsManager.js"></script> <!-- Do not delete -->
  <script>
    const levelManager = new level();
    const levelNumber = 30;
    init(levelNumber);
    levelManager.updateTip("Roll the designated number to win! (0-9)");
    levelManager.updateCompleteMessage("Congratulations! You rolled the right number!");
    levelManager.setSkipEnable(true);

    const rollButton = document.getElementById("rollButton");
    const rolledNumberDiv = document.getElementById("rolledNumber");
    const designatedNumberDiv = document.getElementById("designatedNumber");

    let designatedNumber = Math.floor(Math.random() * 100);
    designatedNumberDiv.textContent = `Designated Number: ${designatedNumber}`;

    let done = false;

    rollButton.addEventListener("click", () => {
      if (done) {
        levelManager.completeLevel();
        return;
      }
      const rolled = Math.floor(Math.random() * 100);
      rolledNumberDiv.textContent = rolled;
      if (rolled === designatedNumber) {
        levelManager.completeLevel();
        // rollButton.disabled = true;
        rollButton.textContent = "Next Level";
        done = true;
      } else {
        // Pick a new designated number and update display
        let newDesignated;
        do {
          newDesignated = Math.floor(Math.random() * 100);
        } while (newDesignated === designatedNumber);
        designatedNumber = newDesignated;
        designatedNumberDiv.textContent = `Designated Number: ${designatedNumber}`;
      }
    });

    document.addEventListener("contextmenu", (e) => {
      e.preventDefault();
    });
  </script>
</body>
</html>
